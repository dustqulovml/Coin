<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <title>Notcoin Gold VIP</title>
    <style>
        :root { --gold: #f3ba2f; --bg: #000000; --panel: #1c1f24; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        
        /* Oltin Score Animatsiyasi */
        .score-container { margin-top: 40px; text-align: center; z-index: 10; }
        #score { font-size: 48px; font-weight: 800; display: flex; align-items: center; gap: 10px; color: white; }
        #score img { width: 40px; height: 40px; }
        #vip-badge { font-size: 14px; color: var(--gold); border: 1px solid var(--gold); padding: 2px 12px; border-radius: 20px; text-transform: uppercase; letter-spacing: 1px; }

        /* Asosiy Tanga */
        .game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
        .coin-wrapper { position: relative; cursor: pointer; transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #coin { width: 260px; height: 260px; border-radius: 50%; background: url('https://notcoin.org/favicon.ico') center/cover; box-shadow: 0 0 50px rgba(243, 186, 47, 0.2); border: 10px solid #282a2e; }
        
        /* Energiya va Progress */
        .footer-ui { width: 90%; max-width: 400px; padding-bottom: 40px; }
        .energy-bar-wrap { width: 100%; height: 14px; background: #282a2e; border-radius: 10px; margin: 15px 0; overflow: hidden; position: relative; border: 1px solid #333; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #f3ba2f, #fce095); transition: width 0.3s; }
        .stats-row { display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; }

        /* Pastki Menyu */
        .nav-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .nav-item { background: var(--panel); border: 1px solid #333; border-radius: 16px; padding: 15px; text-align: center; font-weight: 600; font-size: 14px; color: #fff; text-decoration: none; }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 5px; }

        /* Referal Modal */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 100; }
        #ref-modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 85%; background: #17181c; border-top: 4px solid var(--gold); border-radius: 30px 30px 0 0; z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px; box-sizing: border-box; }
        #ref-modal.active { bottom: 0; }
        .ref-card { background: #25282e; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 25px; border: 1px solid #333; }
        .bonus-item { display: flex; justify-content: space-between; background: #1f2126; padding: 15px; margin-bottom: 10px; border-radius: 12px; border-left: 5px solid #444; }
        .bonus-item.achieved { border-left-color: #4caf50; color: #4caf50; }

        /* Tapping Effect */
        .tap-effect { position: absolute; color: white; font-size: 38px; font-weight: 900; animation: moveUp 0.8s ease-out forwards; pointer-events: none; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        @keyframes moveUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-150px) scale(1.5); } }
    </style>
</head>
<body>

    <div class="score-container">
        <div id="vip-badge">Bronze League</div>
        <div id="score">0</div>
    </div>

    <div class="game-area">
        <div class="coin-wrapper" id="coin-trigger">
            <div id="coin"></div>
        </div>
    </div>

    <div class="footer-ui">
        <div class="stats-row">
            <span>⚡ <span id="en-val">1000</span>/1000</span>
            <span style="color:var(--gold)">Level 1</span>
        </div>
        <div class="energy-bar-wrap">
            <div id="energy-fill"></div>
        </div>
        <div class="nav-menu">
            <div class="nav-item" onclick="upgrade()">🚀 Boost</div>
            <div class="nav-item" style="border-color: var(--gold)" onclick="openRef()">👥 Friends</div>
        </div>
    </div>

    <div id="modal-overlay" onclick="closeRef()"></div>
    <div id="ref-modal">
        <h2 style="margin-top:0">Invite Friends</h2>
        <div class="ref-card">
            <div style="font-size:14px; color:#aaa">Total Referrals</div>
            <div style="font-size:36px; font-weight:800; color:var(--gold)" id="ref-count">0</div>
        </div>
        <div class="bonus-list">
            <div class="bonus-item" id="r5"><span>5 Friends</span> <b>+50,000</b></div>
            <div class="bonus-item" id="r10"><span>10 Friends</span> <b>+150,000</b></div>
            <div class="bonus-item" id="r50"><span>50 Friends</span> <b>+1,000,000</b></div>
        </div>
        <button onclick="shareLink()" style="width:100%; background:var(--gold); border:none; padding:18px; border-radius:15px; font-weight:800; font-size:16px; margin-top:30px">Send Invite Link</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = {
            apiKey: "AIzaSyAhCoj7uJply9mLRN9unsalONxV1CbZ2iY",
            authDomain: "tapcoin-a6289.firebaseapp.com",
            databaseURL: "https://tapcoin-a6289-default-rtdb.firebaseio.com",
            projectId: "tapcoin-a6289",
            storageBucket: "tapcoin-a6289.firebasestorage.app",
            messagingSenderId: "151358729111",
            appId: "1:151358729111:web:282269198f05cf9b89b2d2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userId = tg.initDataUnsafe?.user?.id || "test_user";

        let user = { sc: 0, en: 1000, mx: 1000, pw: 1, refs: 0, lvl: 1 };
        let isLoaded = false;

        // Ma'lumotlarni 'users' papkasidan yuklash
        const docRef = db.ref('users/' + userId);

        docRef.on('value', (snap) => {
            if (snap.exists()) {
                user = snap.val();
                isLoaded = true;
                updateView();
            } else {
                handleNewUser();
            }
        });

        function handleNewUser() {
            const urlParams = new URLSearchParams(window.location.search);
            const refId = urlParams.get('tgWebAppStartParam')?.replace('ref', '') || tg.initDataUnsafe?.start_param?.replace('ref', '');

            if (refId && refId !== userId.toString()) {
                db.ref('users/' + refId).transaction((u) => {
                    if (u) {
                        u.sc = (u.sc || 0) + 25000; // Do'st uchun bonus
                        u.refs = (u.refs || 0) + 1;
                        // Pog'onali bonuslar
                        if(u.refs === 5) u.sc += 50000;
                        if(u.refs === 10) u.sc += 150000;
                        if(u.refs === 50) u.sc += 1000000;
                    }
                    return u;
                });
            }
            docRef.set(user);
        }

        function updateView() {
            if(!isLoaded) return;
            document.getElementById('score').innerText = Math.floor(user.sc).toLocaleString();
            document.getElementById('en-val').innerText = Math.floor(user.en);
            document.getElementById('energy-fill').style.width = (user.en / user.mx * 100) + "%";
            document.getElementById('ref-count').innerText = user.refs || 0;
            
            // Liga yangilash
            const badge = document.getElementById('vip-badge');
            if(user.sc > 1000000) badge.innerText = "Gold League";
            else if(user.sc > 100000) badge.innerText = "Silver League";

            // Referal status
            if(user.refs >= 5) document.getElementById('r5').classList.add('achieved');
            if(user.refs >= 10) document.getElementById('r10').classList.add('achieved');
        }

        // Tapping Logikasi (Multi-touch qo'llab-quvvatlaydi)
        document.getElementById('coin-trigger').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touches = e.changedTouches;
            
            for (let i = 0; i < touches.length; i++) {
                if (user.en >= user.pw) {
                    user.sc += user.pw;
                    user.en -= user.pw;
                    createTapEffect(touches[i].pageX, touches[i].pageY);
                }
            }
            updateView();
            docRef.update({ sc: user.sc, en: user.en });
            
            // Vizual qisqarish
            document.getElementById('coin').style.transform = "scale(0.92) translateY(5px)";
            setTimeout(() => {
                document.getElementById('coin').style.transform = "scale(1) translateY(0)";
            }, 70);
        });

        function createTapEffect(x, y) {
            const el = document.createElement('div');
            el.className = 'tap-effect';
            el.innerText = `+${user.pw}`;
            el.style.left = `${x - 20}px`;
            el.style.top = `${y - 50}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        function openRef() {
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('ref-modal').classList.add('active');
        }

        function closeRef() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('ref-modal').classList.remove('active');
        }

        function shareLink() {
            const link = `https://t.me/Tapcoinsumbot/app?startapp=ref${userId}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=₿+Notcoin+Goldda+ballarni+yig'amiz!+25k+sovg'a!`);
        }

        function upgrade() {
            const cost = user.pw * 2000;
            if(user.sc >= cost) {
                user.sc -= cost;
                user.pw++;
                docRef.update({ sc: user.sc, pw: user.pw });
                tg.showAlert(`Level Up! Endi har bir tap: +${user.pw}`);
            } else {
                tg.showAlert(`Mablag' kam! Keyingi daraja uchun: ${cost.toLocaleString()} NOT kerak.`);
            }
        }

        // Energiya regeneratsiyasi (Avtomatik to'lish)
        setInterval(() => {
            if (isLoaded && user.en < user.mx) {
                user.en = Math.min(user.mx, user.en + 2);
                updateView();
                docRef.update({ en: user.en });
            }
        }, 1500);
    </script>
</body>
</html>
