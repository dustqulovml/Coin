<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <title>Tap Coin VIP Pro</title>
    <style>
        :root { --gold: linear-gradient(180deg, #ffdf00 0%, #d4af37 100%); --bg: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        .header { margin-top: 25px; text-align: center; width: 100%; }
        #score { font-size: 50px; font-weight: 900; margin: 10px 0; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .vip-info { background: rgba(255, 223, 0, 0.1); border: 1px solid gold; padding: 5px 15px; border-radius: 15px; font-size: 14px; color: gold; font-weight: bold; display: inline-block; }
        .coin-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        #coin { width: 240px; height: 240px; transition: transform 0.05s; cursor: pointer; }
        #coin img { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 30px rgba(255, 223, 0, 0.2); }
        .footer { width: 90%; max-width: 400px; padding-bottom: 30px; }
        .energy-box { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
        .progress-bar { width: 100%; height: 10px; background: #222; border-radius: 5px; overflow: hidden; }
        #progress-fill { height: 100%; width: 100%; background: var(--gold); transition: width 0.2s; }
        .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px; border-radius: 12px; font-size: 13px; font-weight: bold; cursor: pointer; text-align: center; }
        .tap-num { position: absolute; color: gold; font-size: 30px; font-weight: 800; animation: floatUp 0.7s forwards; pointer-events: none; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="header">
        <div id="vip-level" class="vip-info">VIP 1</div>
        <div id="score">0</div>
        <div id="next-vip" style="font-size: 11px; color: #888;">Keyingi VIP: 10,000</div>
    </div>

    <div class="coin-area" id="tap-zone">
        <div id="coin"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968260.png" alt="coin"></div>
    </div>

    <div class="footer">
        <div class="energy-box">
            <span>⚡ Energiya: <span id="en-txt">1000/1000</span></span>
            <span>👆 Tap: +<span id="pwr-txt">1</span></span>
        </div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div class="menu">
            <div class="btn" onclick="upgrade()">🚀 Boost (+1)</div>
            <div class="btn" style="color: gold;" onclick="sendInvite()">👥 Taklif (+10,000)</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAhCoj7uJply9mLRN9unsalONxV1CbZ2iY",
            authDomain: "tapcoin-a6289.firebaseapp.com",
            databaseURL: "https://tapcoin-a6289-default-rtdb.firebaseio.com",
            projectId: "tapcoin-a6289",
            storageBucket: "tapcoin-a6289.firebasestorage.app",
            messagingSenderId: "151358729111",
            appId: "1:151358729111:web:282269198f05cf9b89b2d2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userId = tg.initDataUnsafe?.user?.id || "test_user";

        // Boshlang'ich ma'lumotlar (NaN bo'lmasligi uchun)
        let data = { sc: 0, en: 1000, mx: 1000, pw: 1, vip: 1 };

        function updateUI() {
            // Ma'lumotlar son ekanligini tekshiramiz
            const score = Number(data.sc) || 0;
            const energy = Number(data.en) || 0;
            const maxEnergy = Number(data.mx) || 1000;
            const power = Number(data.pw) || 1;
            const vipLvl = Number(data.vip) || 1;

            document.getElementById('score').innerText = Math.floor(score).toLocaleString();
            document.getElementById('vip-level').innerText = "VIP " + vipLvl;
            document.getElementById('en-txt').innerText = `${Math.floor(energy)}/${maxEnergy}`;
            document.getElementById('pwr-txt').innerText = power;
            document.getElementById('progress-fill').style.width = (energy / maxEnergy * 100) + "%";
            
            let next = vipLvl < 10 ? [10000, 50000, 75000, 100000, 150000, 200000, 300000, 400000, 500000][vipLvl-1] : "MAX";
            document.getElementById('next-vip').innerText = "Keyingi VIP: " + (next === "MAX" ? "MAX" : next.toLocaleString());
        }

        // Ma'lumotlarni bazadan olish
        db.ref('users/' + userId).on('value', (snap) => {
            if (snap.exists()) {
                const cloudData = snap.val();
                data = {
                    sc: Number(cloudData.sc) || 0,
                    en: Number(cloudData.en) || 1000,
                    mx: Number(cloudData.mx) || 1000,
                    pw: Number(cloudData.pw) || 1,
                    vip: Number(cloudData.vip) || 1
                };
                checkVIP();
                updateUI();
            } else {
                const startParam = tg.initDataUnsafe?.start_param;
                if (startParam && startParam.startsWith('ref')) {
                    const referrerId = startParam.replace('ref', '');
                    db.ref('users/' + referrerId + '/sc').transaction(s => (Number(s) || 0) + 10000);
                }
                db.ref('users/' + userId).set(data);
                updateUI();
            }
        });

        function checkVIP() {
            const levels = [
                { L: 10, s: 500000, b: 200000 }, { L: 9, s: 400000, b: 150000 },
                { L: 8, s: 300000, b: 100000 },  { L: 7, s: 200000, b: 80000 },
                { L: 6, s: 150000, b: 60000 },   { L: 5, s: 100000, b: 50000 },
                { L: 4, s: 75000, b: 40000 },    { L: 3, s: 50000, b: 40000 },
                { L: 2, s: 10000, b: 20000 }
            ];

            for (let lvl of levels) {
                if (data.sc >= lvl.s && data.vip < lvl.L) {
                    data.sc += lvl.b;
                    data.vip = lvl.L;
                    db.ref('users/' + userId).update({ sc: data.sc, vip: data.vip });
                    tg.showAlert(`Tabriklaymiz! VIP ${lvl.L} darajasiga yetdingiz va ${lvl.b} bonus oldingiz!`);
                    break;
                }
            }
        }

        document.getElementById('tap-zone').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(data.en >= data.pw) {
                data.sc += data.pw;
                data.en -= data.pw;
                showPop(e.touches[0].clientX, e.touches[0].clientY);
                updateUI();
                db.ref('users/' + userId).update({ sc: data.sc, en: data.en });
            }
            document.getElementById('coin').style.transform = "scale(0.95)";
            setTimeout(() => document.getElementById('coin').style.transform = "scale(1)", 50);
        });

        function showPop(x, y) {
            const div = document.createElement('div');
            div.className = 'tap-num'; div.innerText = `+${data.pw}`;
            div.style.left = x + 'px'; div.style.top = y + 'px';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 700);
        }

        function upgrade() {
            let cost = data.pw * 500;
            if(data.sc >= cost) {
                data.sc -= cost; data.pw++;
                db.ref('users/' + userId).update({ sc: data.sc, pw: data.pw });
            } else { tg.showAlert("Ball yetarli emas! Boost narxi: " + cost); }
        }

        function sendInvite() {
            const url = `https://t.me/Tapcoinsumbot/start?startapp=ref${userId}`;
            const text = "Do'stim, men bilan o'yna va VIP darajaga ko'taril! 🚀";
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(text)}`);
        }

        setInterval(() => {
            if(data.en < data.mx) { 
                data.en = Math.min(data.mx, data.en + 2); 
                updateUI(); 
                db.ref('users/' + userId).update({ en: data.en });
            }
        }, 2000);
    </script>
</body>
</html>
