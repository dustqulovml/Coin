<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Notcoin Pro Max</title>
    <style>
        :root { --main-color: #f3ba2f; --bg-color: #000; }
        body {
            margin: 0; background-color: var(--bg-color); color: #fff;
            font-family: 'Segoe UI', sans-serif; display: flex;
            flex-direction: column; align-items: center; height: 100vh;
            overflow: hidden; user-select: none; touch-action: manipulation;
        }

        #header { margin-top: 30px; text-align: center; }
        #score { font-size: 50px; font-weight: 800; margin: 10px 0; text-shadow: 0 0 20px rgba(243, 186, 47, 0.5); }
        .league { color: var(--main-color); font-size: 14px; letter-spacing: 2px; font-weight: bold; }

        #coin-container { position: relative; margin-top: 50px; perspective: 1000px; }
        #coin {
            width: 240px; height: 240px; background: radial-gradient(circle, #f3ba2f 0%, #a67c00 100%);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            font-size: 120px; cursor: pointer; border: 8px solid #ffd700;
            box-shadow: 0 0 40px rgba(243, 186, 47, 0.4); transition: transform 0.05s;
        }
        
        .wobble { animation: wobbleAnim 0.2s ease-in-out; }
        @keyframes wobbleAnim {
            0% { transform: scale(1) rotateX(0); }
            50% { transform: scale(0.92) rotateX(10deg); }
            100% { transform: scale(1) rotateX(0); }
        }

        .tap-text {
            position: absolute; color: #fff; font-size: 35px; font-weight: bold;
            pointer-events: none; animation: flyUp 0.8s ease-out forwards; z-index: 100;
        }
        @keyframes flyUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-150px); }
        }

        #bottom-bar { position: fixed; bottom: 20px; width: 90%; display: flex; flex-direction: column; gap: 15px; }
        #energy-bar { width: 100%; height: 14px; background: #333; border-radius: 10px; overflow: hidden; border: 1px solid #444; }
        #energy-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #f3ba2f, #ffea00); transition: 0.2s; }

        .menu { display: flex; justify-content: space-between; gap: 10px; }
        .btn {
            flex: 1; background: linear-gradient(145deg, #222, #111); border: 1px solid #444; color: white;
            padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); background: #333; }
        .btn span { display: block; font-size: 11px; color: var(--main-color); margin-top: 5px; }
    </style>
</head>
<body>

    <div id="header">
        <div class="league">PREMIUM LEAGUE</div>
        <div id="score">0</div>
    </div>

    <div id="coin-container">
        <div id="coin">🪙</div>
    </div>

    <div id="bottom-bar">
        <div class="energy-box">
            <div style="margin-bottom: 8px; font-weight: bold;">⚡ <span id="energy-num">1000/1000</span></div>
            <div id="energy-bar"><div id="energy-fill"></div></div>
        </div>
        
        <div class="menu">
            <button class="btn" onclick="claimBonus()">🎁 Bonus<span id="bonus-status">Tayyor</span></button>
            <button class="btn" onclick="upgradeTap()">🚀 Boost<span id="boost-price">100</span></button>
            <button class="btn" onclick="showFriends()">👥 Friends<span>+5000</span></button>
        </div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('score')) || 0;
        let energy = parseInt(localStorage.getItem('energy')) || 1000;
        let tapPower = parseInt(localStorage.getItem('tapPower')) || 1;
        let maxEnergy = 1000;

        const scoreEl = document.getElementById('score');
        const energyEl = document.getElementById('energy-num');
        const energyFill = document.getElementById('energy-fill');
        const coin = document.getElementById('coin');
        const boostPriceEl = document.getElementById('boost-price');

        function updateUI() {
            scoreEl.innerText = score.toLocaleString();
            energyEl.innerText = `${Math.floor(energy)}/${maxEnergy}`;
            energyFill.style.width = (energy / maxEnergy * 100) + "%";
            boostPriceEl.innerText = (tapPower * 150).toLocaleString();
            
            localStorage.setItem('score', score);
            localStorage.setItem('energy', energy);
            localStorage.setItem('tapPower', tapPower);
        }

        function handleTap(x, y) {
            if (energy >= tapPower) {
                score += tapPower;
                energy -= tapPower;
                
                coin.classList.remove('wobble');
                void coin.offsetWidth;
                coin.classList.add('wobble');

                createTapText(x, y);
                updateUI();
            }
        }

        coin.addEventListener('click', (e) => handleTap(e.clientX, e.clientY));
        coin.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTap(e.touches[0].clientX, e.touches[0].clientY);
        });

        function createTapText(x, y) {
            const txt = document.createElement('div');
            txt.className = 'tap-text';
            txt.innerText = `+${tapPower}`;
            txt.style.left = (x - 20) + 'px';
            txt.style.top = (y - 50) + 'px';
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 800);
        }

        function upgradeTap() {
            let price = tapPower * 150;
            if (score >= price) {
                score -= price;
                tapPower++;
                updateUI();
            } else { alert("Mablag' yetarli emas!"); }
        }

        function claimBonus() {
            const last = localStorage.getItem('lastBonus');
            const now = Date.now();
            if (!last || now - last > 24*60*60*1000) {
                score += 10000;
                localStorage.setItem('lastBonus', now);
                updateUI();
                alert("10,000 tanga bonus olindi! 🎁");
            } else { alert("Bonusni har 24 soatda olish mumkin!"); }
        }

        function showFriends() { alert("Do'stlarni taklif qilish tizimi tez kunda ishga tushadi!"); }

        setInterval(() => {
            if (energy < maxEnergy) {
                energy = Math.min(maxEnergy, energy + 2);
                updateUI();
            }
        }, 1000);

        updateUI();
    </script>
</body>
</html>
