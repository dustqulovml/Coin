<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <title>Tap Coin Gold</title>
    <style>
        :root { --gold: #ffbf00; --bg: #0a0a0a; --card: #151515; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        
        /* Main UI */
        .header { margin-top: 25px; text-align: center; width: 100%; }
        #vip-level { background: rgba(255,191,0,0.15); border: 1px solid var(--gold); padding: 4px 15px; border-radius: 20px; font-size: 13px; color: var(--gold); font-weight: bold; }
        #score { font-size: 48px; font-weight: 800; margin: 10px 0; }
        
        .coin-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        #coin { 
            width: 250px; height: 250px; background: radial-gradient(circle, #ffe066 0%, #ffbf00 50%, #b38600 100%); 
            border-radius: 50%; border: 8px solid #cc9900; box-shadow: 0 0 30px rgba(255,191,0,0.2);
            display: flex; align-items: center; justify-content: center; transition: transform 0.05s;
        }
        #coin::after { content: '₿'; font-size: 130px; color: #b38600; font-weight: 900; }

        .footer { width: 90%; max-width: 400px; padding-bottom: 30px; }
        .info-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; color: #888; }
        .progress-bar { width: 100%; height: 8px; background: #222; border-radius: 4px; overflow: hidden; margin-bottom: 15px; }
        #progress-fill { height: 100%; width: 100%; background: var(--gold); transition: 0.2s; }
        .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: var(--card); border: 1px solid #333; color: white; padding: 14px; border-radius: 12px; font-size: 14px; font-weight: 600; text-align: center; }

        /* Referral Modal (Pasdagi oyna) */
        #ref-modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; height: 70%;
            background: #111; border-top: 2px solid var(--gold); border-radius: 25px 25px 0 0;
            z-index: 1000; transition: bottom 0.4s ease; padding: 20px; box-sizing: border-box;
            overflow-y: auto;
        }
        #ref-modal.active { bottom: 0; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .ref-stat { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 15px; text-align: center; border: 1px solid #222; }
        .bonus-list { list-style: none; padding: 0; }
        .bonus-item { 
            display: flex; justify-content: space-between; background: #1a1a1a; 
            padding: 12px; margin-bottom: 8px; border-radius: 10px; font-size: 14px;
        }
        .bonus-item.done { border-left: 4px solid #4caf50; color: #4caf50; }
        
        .tap-num { position: absolute; color: white; font-size: 32px; font-weight: 800; animation: float 0.7s forwards; pointer-events: none; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); display:none; z-index: 999; }
    </style>
</head>
<body>

    <div class="header">
        <div id="vip-level">VIP 1</div>
        <div id="score">0</div>
    </div>

    <div class="coin-area" id="tap-zone">
        <div id="coin"></div>
    </div>

    <div class="footer">
        <div class="info-row">
            <span>⚡ <span id="en-txt">1000/1000</span></span>
            <span>👆 +<span id="pwr-txt">1</span></span>
        </div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div class="menu">
            <div class="btn" onclick="upgrade()">🚀 Boost</div>
            <div class="btn" style="color: var(--gold);" onclick="toggleModal(true)">👥 Referallar</div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleModal(false)"></div>
    <div id="ref-modal">
        <div class="modal-header">
            <h2 style="margin:0; color: var(--gold);">Do'stlar Bo'limi</h2>
            <button onclick="toggleModal(false)" style="background:none; border:none; color:white; font-size:20px;">✕</button>
        </div>
        
        <div class="ref-stat">
            <div style="font-size: 14px; color: #888;">Jami takliflar</div>
            <div style="font-size: 32px; font-weight: 800;"><span id="ref-count">0</span> ta</div>
        </div>

        <h3 style="font-size: 16px; margin-bottom: 10px;">Maxsus Bonuslar:</h3>
        <div class="bonus-list">
            <div class="bonus-item" id="b1"><span>5 ta do'st</span> <span>+25,000 ball</span></div>
            <div class="bonus-item" id="b2"><span>10 ta do'st</span> <span>+50,000 ball</span></div>
            <div class="bonus-item" id="b3"><span>50 ta do'st</span> <span>+250,000 ball</span></div>
            <div class="bonus-item" id="b4"><span>100 ta do'st</span> <span>+500,000 ball</span></div>
            <div class="bonus-item" id="b5"><span>200 ta do'st</span> <span>+1,000,000 ball</span></div>
        </div>

        <div class="btn" style="margin-top: 20px; background: var(--gold); color: black;" onclick="sendInvite()">Do'stni Taklif Qilish</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = {
            apiKey: "AIzaSyAhCoj7uJply9mLRN9unsalONxV1CbZ2iY",
            authDomain: "tapcoin-a6289.firebaseapp.com",
            databaseURL: "https://tapcoin-a6289-default-rtdb.firebaseio.com",
            projectId: "tapcoin-a6289",
            storageBucket: "tapcoin-a6289.firebasestorage.app",
            messagingSenderId: "151358729111",
            appId: "1:151358729111:web:282269198f05cf9b89b2d2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userId = tg.initDataUnsafe?.user?.id || "test_user";

        let data = { sc: 0, en: 1000, mx: 1000, pw: 1, vip: 1, refs: 0 };

        db.ref('users/' + userId).on('value', (snap) => {
            if (snap.exists()) {
                const cloud = snap.val();
                data = {
                    sc: Number(cloud.sc) || 0,
                    en: Number(cloud.en) || 1000,
                    mx: Number(cloud.mx) || 1000,
                    pw: Number(cloud.pw) || 1,
                    vip: Number(cloud.vip) || 1,
                    refs: Number(cloud.refs) || 0
                };
                checkVIP();
                updateUI();
            } else {
                const urlParams = new URLSearchParams(window.location.search);
                const startParam = urlParams.get('tgWebAppStartParam');
                if (startParam && startParam.startsWith('ref')) {
                    const rId = startParam.replace('ref', '');
                    db.ref('users/' + rId).transaction(u => {
                        if(u) {
                            u.sc = (Number(u.sc) || 0) + 10000;
                            u.refs = (Number(u.refs) || 0) + 1;
                            const r = u.refs;
                            if(r === 5) u.sc += 25000;
                            else if(r === 10) u.sc += 50000;
                            else if(r === 50) u.sc += 250000;
                            else if(r === 100) u.sc += 500000;
                            else if(r === 200) u.sc += 1000000;
                        }
                        return u;
                    });
                }
                db.ref('users/' + userId).set(data);
            }
        });

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(data.sc).toLocaleString();
            document.getElementById('vip-level').innerText = "VIP " + data.vip;
            document.getElementById('ref-count').innerText = data.refs;
            document.getElementById('en-txt').innerText = `${Math.floor(data.en)}/${data.mx}`;
            document.getElementById('pwr-txt').innerText = data.pw;
            document.getElementById('progress-fill').style.width = (data.en / data.mx * 100) + "%";
            
            // Bonuslarni tekshirish va rangini o'zgartirish
            const r = data.refs;
            if(r >= 5) document.getElementById('b1').classList.add('done');
            if(r >= 10) document.getElementById('b2').classList.add('done');
            if(r >= 50) document.getElementById('b3').classList.add('done');
            if(r >= 100) document.getElementById('b4').classList.add('done');
            if(r >= 200) document.getElementById('b5').classList.add('done');
        }

        function toggleModal(show) {
            document.getElementById('ref-modal').classList.toggle('active', show);
            document.getElementById('overlay').style.display = show ? 'block' : 'none';
        }

        function checkVIP() {
            const lvls = [
                {L:10,s:500000,b:200000}, {L:9,s:400000,b:150000}, {L:8,s:300000,b:100000},
                {L:7,s:200000,b:80000}, {L:6,s:150000,b:60000}, {L:5,s:100000,b:50000},
                {L:4,s:75000,b:40000}, {L:3,s:50000,b:40000}, {L:2,s:10000,b:20000}
            ];
            for (let v of lvls) {
                if (data.sc >= v.s && data.vip < v.L) {
                    data.sc += v.b; data.vip = v.L;
                    db.ref('users/' + userId).update({ sc: data.sc, vip: data.vip });
                    tg.showAlert(`VIP ${v.L} daraja! +${v.b.toLocaleString()} bonus!`);
                    break;
                }
            }
        }

        document.getElementById('coin').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = document.getElementById('coin').getBoundingClientRect();
            const cX = rect.left + rect.width / 2;
            const cY = rect.top + rect.height / 2;
            const r = rect.width / 2;
            for (let i = 0; i < e.targetTouches.length; i++) {
                const t = e.targetTouches[i];
                const d = Math.sqrt(Math.pow(t.clientX - cX, 2) + Math.pow(t.clientY - cY, 2));
                if (d <= r && data.en >= data.pw) {
                    data.sc += data.pw; data.en -= data.pw;
                    showPop(t.clientX, t.clientY);
                    updateUI();
                    db.ref('users/' + userId).update({ sc: data.sc, en: data.en });
                }
            }
            document.getElementById('coin').style.transform = "scale(0.95)";
            setTimeout(() => document.getElementById('coin').style.transform = "scale(1)", 50);
        });

        function showPop(x, y) {
            const d = document.createElement('div');
            d.className = 'tap-num'; d.innerText = `+${data.pw}`;
            d.style.left = x + 'px'; d.style.top = y + 'px';
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 700);
        }

        function upgrade() {
            let cost = data.pw * 500;
            if (data.sc >= cost) {
                data.sc -= cost; data.pw++;
                db.ref('users/' + userId).update({ sc: data.sc, pw: data.pw });
            } else tg.showAlert("Ball yetarli emas!");
        }

        function sendInvite() {
            const url = `https://t.me/Tapcoinsumbot/start?startapp=ref${userId}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=Bonuslarni+yig'ing!`);
        }

        setInterval(() => {
            if (data.en < data.mx) { 
                data.en = Math.min(data.mx, data.en + 2); updateUI();
                db.ref('users/' + userId).update({ en: data.en });
            }
        }, 2000);
    </script>
</body>
</html>
