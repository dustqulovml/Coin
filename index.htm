<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: linear-gradient(180deg, #ffdf00 0%, #d4af37 100%); --bg: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        .header { margin-top: 25px; text-align: center; }
        #score { font-size: 50px; font-weight: 900; margin: 10px 0; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #coin { width: 240px; height: 240px; cursor: pointer; transition: transform 0.05s; margin-top: 20px; }
        #coin img { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 20px rgba(255, 223, 0, 0.2); }
        .footer { position: fixed; bottom: 30px; width: 90%; max-width: 400px; }
        .progress-bar { width: 100%; height: 12px; background: #222; border-radius: 6px; overflow: hidden; margin-top: 10px; }
        #progress-fill { height: 100%; width: 100%; background: var(--gold); transition: width 0.2s; }
    </style>
</head>
<body>
    <div class="header">
        <div id="user-info"><b>Salom, </b><span id="name">...</span></div>
        <div id="score">0</div>
        <div id="league" style="color: #888; font-size: 12px; letter-spacing: 1px;">BRONZE LEAGUE</div>
    </div>

    <div id="coin"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968260.png" alt="coin"></div>

    <div class="footer">
        <div style="display: flex; justify-content: space-between; font-size: 12px;">
            <span>⚡ Energy</span> <span id="energy-text">1000/1000</span>
        </div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const userId = tg.initDataUnsafe?.user?.id || "test_user";

        const firebaseConfig = {
            apiKey: "AIzaSyAhCoj7uJply9mLRN9unsalONxV1CbZ2iY",
            authDomain: "tapcoin-a6289.firebaseapp.com",
            databaseURL: "https://tapcoin-a6289-default-rtdb.firebaseio.com",
            projectId: "tapcoin-a6289",
            storageBucket: "tapcoin-a6289.firebasestorage.app",
            messagingSenderId: "151358729111",
            appId: "1:151358729111:web:282269198f05cf9b89b2d2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let data = { s: 0, e: 1000, m: 1000, p: 1 };

        // Ma'lumotni yuklash
        db.ref('users/' + userId).on('value', (snapshot) => {
            if (snapshot.exists()) {
                const cloud = snapshot.val();
                if(Math.abs(cloud.s - data.s) > 2) {
                    data = cloud;
                    updateUI();
                }
            } else {
                db.ref('users/' + userId).set(data);
            }
        });

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(data.s).toLocaleString();
            document.getElementById('name').innerText = tg.initDataUnsafe?.user?.first_name || "O'yinchi";
            document.getElementById('energy-text').innerText = `${Math.floor(data.e)}/${data.m}`;
            document.getElementById('progress-fill').style.width = (data.e / data.m * 100) + "%";
            if(data.s >= 10000) document.getElementById('league').innerText = "SILVER LEAGUE 🥈";
        }

        document.getElementById('coin').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(data.e >= data.p) {
                data.s += data.p;
                data.e -= data.p;
                updateUI();
                db.ref('users/' + userId).update({ s: data.s, e: data.e });
            }
        });

        setInterval(() => {
            if(data.e < data.m) { data.e = Math.min(data.m, data.e + 1); updateUI(); }
        }, 1000);
    </script>
</body>
</html>
