<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <title>Tap Coin VIP Pro</title>
    <style>
        :root { --gold: #ffbf00; --bg: #0a0a0a; --card: #151515; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        .header { margin-top: 25px; text-align: center; width: 100%; }
        #vip-level { background: rgba(255,191,0,0.15); border: 1px solid var(--gold); padding: 5px 15px; border-radius: 20px; font-size: 14px; color: var(--gold); font-weight: bold; }
        #score { font-size: 50px; font-weight: 800; margin: 10px 0; }
        .coin-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
        #coin { width: 240px; height: 240px; background: radial-gradient(circle, #ffe066 0%, #ffbf00 50%, #b38600 100%); border-radius: 50%; border: 8px solid #cc9900; box-shadow: 0 0 30px rgba(255,191,0,0.2); display: flex; align-items: center; justify-content: center; transition: transform 0.05s; }
        #coin::after { content: '₿'; font-size: 120px; color: #b38600; font-weight: 900; }
        .footer { width: 90%; max-width: 400px; padding-bottom: 30px; }
        .info-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; color: #aaa; }
        .progress-bar { width: 100%; height: 10px; background: #222; border-radius: 5px; overflow: hidden; margin-bottom: 15px; }
        #progress-fill { height: 100%; width: 0%; background: var(--gold); transition: 0.2s; }
        .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: var(--card); border: 1px solid #333; color: white; padding: 14px; border-radius: 12px; font-size: 14px; font-weight: bold; text-align: center; }
        #ref-modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 75%; background: #111; border-top: 3px solid var(--gold); border-radius: 25px 25px 0 0; z-index: 1000; transition: 0.4s; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #ref-modal.active { bottom: 0; }
        .bonus-item { display: flex; justify-content: space-between; background: #1a1a1a; padding: 12px; margin-bottom: 8px; border-radius: 10px; font-size: 14px; border-left: 4px solid #333; }
        .bonus-item.done { border-left-color: #4caf50; color: #4caf50; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; z-index: 999; }
        .tap-num { position: absolute; color: white; font-size: 32px; font-weight: 800; animation: float 0.7s forwards; pointer-events: none; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>
    <div class="header">
        <div id="vip-level">Yuklanmoqda...</div>
        <div id="score">0</div>
    </div>
    <div class="coin-area" id="tap-zone"><div id="coin"></div></div>
    <div class="footer">
        <div class="info-row"><span>⚡ <span id="en-txt">0/0</span></span><span>👆 +<span id="pwr-txt">0</span></span></div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div class="menu">
            <div class="btn" onclick="upgrade()">🚀 Boost</div>
            <div class="btn" style="color: var(--gold);" onclick="toggleModal(true)">👥 Do'stlar</div>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="toggleModal(false)"></div>
    <div id="ref-modal">
        <h2 style="color:var(--gold);">Referal Bonuslar</h2>
        <div style="background:var(--card); padding:15px; border-radius:15px; text-align:center; margin-bottom:15px; border:1px solid #222;">
            <div style="color:#888;">Takliflar: <span id="ref-count" style="color:white; font-weight:bold;">0</span> ta</div>
        </div>
        <div class="bonus-list">
            <div class="bonus-item" id="b1"><span>5 do'st</span> <span>+25,000 ₿</span></div>
            <div class="bonus-item" id="b2"><span>10 do'st</span> <span>+50,000 ₿</span></div>
            <div class="bonus-item" id="b3"><span>50 do'st</span> <span>+250,000 ₿</span></div>
        </div>
        <button class="btn" style="width:100%; margin-top:20px; background:var(--gold); color:black;" onclick="sendInvite()">Do'stni taklif qilish</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = {
            apiKey: "AIzaSyAhCoj7uJply9mLRN9unsalONxV1CbZ2iY",
            authDomain: "tapcoin-a6289.firebaseapp.com",
            databaseURL: "https://tapcoin-a6289-default-rtdb.firebaseio.com",
            projectId: "tapcoin-a6289",
            storageBucket: "tapcoin-a6289.firebasestorage.app",
            messagingSenderId: "151358729111",
            appId: "1:151358729111:web:282269198f05cf9b89b2d2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userId = tg.initDataUnsafe?.user?.id || "test_user";

        let data = { sc: 0, en: 1000, mx: 1000, pw: 1, vip: 1, refs: 0 };
        let loaded = false;

        // Referal va Ma'lumotlarni yuklash funksiyasi
        function initApp() {
            const userRef = db.ref('users/' + userId);
            
            userRef.once('value', (snap) => {
                if (snap.exists()) {
                    data = snap.val();
                    loaded = true;
                    updateUI();
                } else {
                    // Yangi foydalanuvchi - Referalni tekshirish
                    const urlParams = new URLSearchParams(window.location.search);
                    const startParam = urlParams.get('tgWebAppStartParam') || tg.initDataUnsafe?.start_param;
                    
                    if (startParam && startParam.startsWith('ref')) {
                        const rId = startParam.replace('ref', '');
                        if(rId !== userId.toString()) {
                            db.ref('users/' + rId).transaction((u) => {
                                if (u) {
                                    u.sc = (Number(u.sc) || 0) + 10000;
                                    u.refs = (Number(u.refs) || 0) + 1;
                                    // Bonuslar
                                    if(u.refs === 5) u.sc += 25000;
                                    if(u.refs === 10) u.sc += 50000;
                                }
                                return u;
                            });
                        }
                    }
                    userRef.set(data).then(() => { loaded = true; updateUI(); });
                }
            });

            // Real vaqtda yangilanish
            userRef.on('value', (s) => { if(s.exists()) { data = s.val(); updateUI(); } });
        }

        function updateUI() {
            if(!loaded) return;
            document.getElementById('score').innerText = Math.floor(data.sc).toLocaleString();
            document.getElementById('vip-level').innerText = "VIP " + (data.vip || 1);
            document.getElementById('en-txt').innerText = Math.floor(data.en) + "/" + data.mx;
            document.getElementById('pwr-txt').innerText = data.pw;
            document.getElementById('ref-count').innerText = data.refs || 0;
            document.getElementById('progress-fill').style.width = (data.en / data.mx * 100) + "%";
            
            if(data.refs >= 5) document.getElementById('b1').classList.add('done');
            if(data.refs >= 10) document.getElementById('b2').classList.add('done');
            if(data.refs >= 50) document.getElementById('b3').classList.add('done');
        }

        document.getElementById('coin').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (loaded && data.en >= data.pw) {
                data.sc += data.pw; data.en -= data.pw;
                updateUI();
                db.ref('users/' + userId).update({ sc: data.sc, en: data.en });
                showPop(e.touches[0].clientX, e.touches[0].clientY);
            }
            document.getElementById('coin').style.transform = "scale(0.95)";
            setTimeout(() => document.getElementById('coin').style.transform = "scale(1)", 50);
        });

        function showPop(x, y) {
            const d = document.createElement('div');
            d.className = 'tap-num'; d.innerText = `+${data.pw}`;
            d.style.left = x + 'px'; d.style.top = y + 'px';
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 700);
        }

        function upgrade() {
            let cost = data.pw * 1000;
            if (data.sc >= cost) {
                data.sc -= cost; data.pw++;
                db.ref('users/' + userId).update({ sc: data.sc, pw: data.pw });
            } else tg.showAlert("Ball yetarli emas!");
        }

        function sendInvite() {
            const bot = "Tapcoinsumbot";
            const url = `https://t.me/${bot}/start?startapp=ref${userId}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=₿+Men+bilan+birga+ball+yig'ing!`);
        }

        function toggleModal(s) {
            document.getElementById('ref-modal').classList.toggle('active', s);
            document.getElementById('overlay').style.display = s ? 'block' : 'none';
        }

        setInterval(() => {
            if (loaded && data.en < data.mx) { 
                data.en = Math.min(data.mx, data.en + 3); updateUI();
                db.ref('users/' + userId).update({ en: data.en });
            }
        }, 2000);

        initApp();
    </script>
</body>
</html>
