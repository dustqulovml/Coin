<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <title>Notcoin Premium Pure</title>
    <style>
        :root { --gold-light: #f3ba2f; --gold-dark: #b38600; --bg: #000000; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        
        .header { margin-top: 50px; text-align: center; }
        .league { color: var(--gold-light); font-size: 13px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }
        #score { font-size: 64px; font-weight: 800; margin: 10px 0; }

        .game-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; }
        
        /* KOD BILAN CHIZILGAN OLTIN TANGA (RASM KERAK EMAS) */
        #coin-btn {
            width: 280px; height: 280px;
            background: radial-gradient(circle at 35% 35%, var(--gold-light) 0%, var(--gold-dark) 100%);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            box-shadow: 0 0 60px rgba(243, 186, 47, 0.4), inset 0 0 20px rgba(0,0,0,0.3);
            border: 10px solid #222;
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.05s;
        }
        /* Tanga ichidagi belgi (Notcoin logosi o'rniga CSS) */
        #coin-btn::before {
            content: "NOT";
            font-size: 50px; font-weight: 900; color: rgba(0,0,0,0.5);
            border: 6px solid rgba(0,0,0,0.5);
            padding: 20px 15px; border-radius: 50%;
        }

        .footer { width: 90%; max-width: 400px; padding-bottom: 40px; }
        .energy-txt { font-weight: bold; margin-bottom: 8px; font-size: 18px; }
        .progress-bar { width: 100%; height: 14px; background: #1a1a1a; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #progress-fill { height: 100%; width: 100%; background: var(--gold-light); transition: 0.2s; }

        .nav { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 25px; }
        .nav-btn { background: #151515; border-radius: 15px; padding: 15px 5px; text-align: center; border: 1px solid #222; }
        .nav-btn b { display: block; font-size: 14px; }
        .nav-btn span { font-size: 11px; color: #777; }

        #ref-modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 70%; background: #111; border-top: 3px solid var(--gold-light); border-radius: 30px 30px 0 0; z-index: 1000; transition: 0.4s; padding: 30px; box-sizing: border-box; }
        #ref-modal.active { bottom: 0; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; z-index: 999; }
        .tap-anim { position: absolute; color: white; font-size: 45px; font-weight: 900; animation: up 0.7s forwards; pointer-events: none; }
        @keyframes up { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-150px); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="league">Premium League</div>
        <div id="score">0</div>
    </div>

    <div class="game-area">
        <div id="coin-btn"></div>
    </div>

    <div class="footer">
        <div class="energy-txt">⚡ <span id="en-num">1000</span>/1000</div>
        <div class="progress-bar"><div id="progress-fill"></div></div>
        <div class="nav">
            <div class="nav-btn">🎁 <b>Bonus</b><span>Tayyor</span></div>
            <div class="nav-btn" onclick="upgrade()">🚀 <b>Boost</b><span id="b-cost">2 500</span></div>
            <div class="nav-btn" onclick="openRef()">👥 <b>Friends</b><span>+25 000</span></div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeRef()"></div>
    <div id="ref-modal">
        <h2 style="color:var(--gold-light); margin-top:0;">Friends</h2>
        <div style="background:#1a1a1a; padding:25px; border-radius:20px; text-align:center; margin-bottom:20px;">
            <div style="color:#666; font-size:14px;">Total Referrals</div>
            <div style="font-size:45px; font-weight:800;" id="ref-count">0</div>
        </div>
        <div class="nav-btn" style="background:var(--gold-light); color:black; padding:18px; border:none;" onclick="sendInvite()">Invite Link</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = {
            apiKey: "AIzaSyAhCoj7uJply9mLRN9unsalONxV1CbZ2iY",
            authDomain: "tapcoin-a6289.firebaseapp.com",
            databaseURL: "https://tapcoin-a6289-default-rtdb.firebaseio.com",
            projectId: "tapcoin-a6289",
            storageBucket: "tapcoin-a6289.firebasestorage.app",
            messagingSenderId: "151358729111",
            appId: "1:151358729111:web:282269198f05cf9b89b2d2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const userId = tg.initDataUnsafe?.user?.id || "user_" + Math.floor(Math.random()*999);

        let user = { sc: 0, en: 1000, mx: 1000, pw: 1, refs: 0 };
        let ready = false;

        const uRef = db.ref('users/' + userId);

        uRef.on('value', (s) => {
            if (s.exists()) {
                user = s.val();
                ready = true;
                update();
            } else {
                const params = new URLSearchParams(window.location.search);
                const start = params.get('tgWebAppStartParam') || tg.initDataUnsafe?.start_param;
                if (start && start.startsWith('ref')) {
                    const rId = start.replace('ref', '');
                    if (rId !== userId.toString()) {
                        db.ref('users/' + rId).transaction(u => {
                            if(u) { u.sc += 25000; u.refs = (u.refs || 0) + 1; }
                            return u;
                        });
                    }
                }
                uRef.set(user);
            }
        });

        function update() {
            if(!ready) return;
            document.getElementById('score').innerText = Math.floor(user.sc).toLocaleString();
            document.getElementById('en-num').innerText = Math.floor(user.en);
            document.getElementById('ref-count').innerText = user.refs || 0;
            document.getElementById('b-cost').innerText = (user.pw * 2500).toLocaleString();
            document.getElementById('progress-fill').style.width = (user.en / user.mx * 100) + "%";
        }

        document.getElementById('coin-btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            const ts = e.changedTouches;
            for(let i=0; i<ts.length; i++) {
                if(user.en >= user.pw) {
                    user.sc += user.pw; user.en -= user.pw;
                    pop(ts[i].pageX, ts[i].pageY);
                }
            }
            update();
            uRef.update({ sc: user.sc, en: user.en });
            document.getElementById('coin-btn').style.transform = "scale(0.94)";
            setTimeout(() => document.getElementById('coin-btn').style.transform = "scale(1)", 60);
        });

        function pop(x, y) {
            const d = document.createElement('div');
            d.className = 'tap-anim'; d.innerText = `+${user.pw}`;
            d.style.left = x + 'px'; d.style.top = y + 'px';
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 700);
        }

        function upgrade() {
            let c = user.pw * 2500;
            if(user.sc >= c) { user.sc -= c; user.pw++; uRef.update({sc:user.sc, pw:user.pw}); }
            else tg.showAlert("Yetarli ball yo'q!");
        }

        function openRef() { document.getElementById('ref-modal').classList.add('active'); document.getElementById('overlay').style.display='block'; }
        function closeRef() { document.getElementById('ref-modal').classList.remove('active'); document.getElementById('overlay').style.display='none'; }
        
        function sendInvite() {
            const link = `https://t.me/Tapcoinsumbot/app?startapp=ref${userId}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Join+and+get+25k!`);
        }

        setInterval(() => {
            if(ready && user.en < user.mx) { user.en = Math.min(user.mx, user.en + 3); update(); uRef.update({en: user.en}); }
        }, 1500);
    </script>
</body>
</html>
