<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: linear-gradient(180deg, #ffdf00 0%, #d4af37 100%); --bg: #0a0a0a; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; touch-action: none; justify-content: center; }
        #score { font-size: 50px; font-weight: 900; margin: 10px 0; background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #coin { width: 220px; height: 220px; cursor: pointer; transition: transform 0.1s; position: relative; }
        #coin img { width: 100%; height: 100%; border-radius: 50%; box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
        .footer { position: fixed; bottom: 30px; width: 90%; max-width: 400px; text-align: center; }
        .btn-invite { width: 100%; padding: 15px; border-radius: 15px; background: #1a1a1a; color: #f3ba2f; border: 1px solid #333; font-weight: bold; font-size: 16px; margin-top: 15px; }
    </style>
</head>
<body>
    <div style="text-align: center; margin-bottom: 20px;">
        <div id="user-name" style="font-size: 18px; font-weight: bold;">...</div>
        <div id="score">0</div>
    </div>

    <div id="coin"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968260.png" alt="coin"></div>

    <div class="footer">
        <button class="btn-invite" onclick="shareRef()">👥 Do'stlarni taklif qilish (+5000)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe?.user;
        const userId = user?.id || "test_user";
        const startParam = tg.initDataUnsafe?.start_param;

        const firebaseConfig = {
            apiKey: "AIzaSyAhCoj7uJply9mLRN9unsalONxV1CbZ2iY",
            authDomain: "tapcoin-a6289.firebaseapp.com",
            databaseURL: "https://tapcoin-a6289-default-rtdb.firebaseio.com",
            projectId: "tapcoin-a6289",
            storageBucket: "tapcoin-a6289.firebasestorage.app",
            messagingSenderId: "151358729111",
            appId: "1:151358729111:web:282269198f05cf9b89b2d2"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let score = 0;

        // Ma'lumotlarni yuklash va referal bonus
        db.ref('users/' + userId).on('value', (snapshot) => {
            if (snapshot.exists()) {
                score = snapshot.val().s;
                document.getElementById('score').innerText = score.toLocaleString();
            } else {
                let initialScore = 0;
                if (startParam && startParam.startsWith('ref')) {
                    const refereeId = startParam.replace('ref', '');
                    db.ref('users/' + refereeId + '/s').transaction(s => (s || 0) + 5000);
                    initialScore = 5000;
                }
                db.ref('users/' + userId).set({ s: initialScore });
            }
            document.getElementById('user-name').innerText = user?.first_name || "O'yinchi";
        });

        document.getElementById('coin').addEventListener('touchstart', (e) => {
            e.preventDefault();
            score++;
            document.getElementById('score').innerText = score.toLocaleString();
            db.ref('users/' + userId).update({ s: score });
            
            document.getElementById('coin').style.transform = "scale(0.95)";
            setTimeout(() => document.getElementById('coin').style.transform = "scale(1)", 100);
        });

        function shareRef() {
            const inviteLink = `https://t.me/Tapcoinsumbot?start=ref${userId}`;
            const shareUrl = `https://t.me/share/url?url=${encodeURIComponent(inviteLink)}&text=Men bilan o'yna va 5000 bonus ol! 🚀`;
            tg.openTelegramLink(shareUrl);
        }
    </script>
</body>
</html>
