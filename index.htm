<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        :root { --gold: #f3ba2f; --bg: #000000; --panel: #1a1c20; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        .header { margin-top: 30px; text-align: center; }
        #vip-rank { color: var(--gold); font-weight: bold; font-size: 14px; text-transform: uppercase; }
        #score { font-size: 60px; font-weight: 800; margin: 5px 0; }
        .coin-area { flex-grow: 1; display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
        #coin { width: 260px; height: 260px; background: radial-gradient(circle, #f3ba2f 0%, #b38600 100%); border-radius: 50%; border: 8px solid #222; box-shadow: 0 0 50px rgba(243, 186, 47, 0.3); display: flex; align-items: center; justify-content: center; transition: transform 0.05s; cursor: pointer; }
        #coin::after { content: "🪙"; font-size: 100px; }
        .footer { width: 90%; padding-bottom: 30px; }
        .energy-bar { width: 100%; height: 12px; background: #222; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        #energy-fill { height: 100%; width: 100%; background: var(--gold); transition: 0.2s; }
        .menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn { background: var(--panel); border-radius: 12px; padding: 12px 5px; text-align: center; border: 1px solid #333; font-size: 11px; cursor: pointer; }
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; height: 75%; background: #111; border-top: 3px solid var(--gold); border-radius: 30px 30px 0 0; z-index: 1000; transition: 0.4s; padding: 25px; box-sizing: border-box; }
        .modal.active { bottom: 0; }
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; z-index: 999; }
        .tap-num { position: absolute; color: white; font-size: 40px; font-weight: 900; animation: float 0.7s forwards; pointer-events: none; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>
    <div class="header"><div id="vip-rank">BRONZE</div><div id="score">0</div></div>
    <div class="coin-area"><div id="coin"></div></div>
    <div class="footer">
        <div>⚡ <span id="en-txt">1000</span>/1000</div>
        <div class="energy-bar"><div id="energy-fill"></div></div>
        <div class="menu">
            <div class="btn" onclick="openMod('tasks-modal')">📝Tasks</div>
            <div class="btn" onclick="daily()">🎁Daily</div>
            <div class="btn" onclick="boost()">🚀Boost</div>
            <div class="btn" onclick="openMod('ref-modal')">👥Refs</div>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="closeMod()"></div>
    <div id="tasks-modal" class="modal"><h2>Vazifalar</h2><button class="btn" style="width:100%;" onclick="doTask(50000)">Kanalga a'zo bo'lish (+50k)</button></div>
    <div id="ref-modal" class="modal"><h2>Do'stlar</h2><p>Takliflar: <span id="ref-count">0</span></p><button class="btn" style="width:100%; background:var(--gold); color:black;" onclick="invite()">LINKNI YUBORISH</button></div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        const firebaseConfig = { apiKey: "AIzaSyAhCoj7uJply9mLRN9unsalONxV1CbZ2iY", authDomain: "tapcoin-a6289.firebaseapp.com", databaseURL: "https://tapcoin-a6289-default-rtdb.firebaseio.com", projectId: "tapcoin-a6289", storageBucket: "tapcoin-a6289.firebasestorage.app", messagingSenderId: "151358729111", appId: "1:151358729111:web:282269198f05cf9b89b2d2" };
        firebase.initializeApp(firebaseConfig); const db = firebase.database();
        const userId = tg.initDataUnsafe?.user?.id || "test_user";
        let user = { sc: 0, en: 1000, mx: 1000, pw: 1, refs: 0, last: 0 };
        const uRef = db.ref('users/' + userId);

        uRef.on('value', (snap) => {
            if (snap.exists()) { user = snap.val(); updateUI(); } 
            else {
                const p = new URLSearchParams(window.location.search);
                const r = p.get('tgWebAppStartParam');
                if (r && r.startsWith('ref')) {
                    const oId = r.replace('ref', '');
                    db.ref('users/'+oId).transaction(u => { if(u){u.sc+=50000; u.refs=(u.refs||0)+1;} return u; });
                    user.sc = 25000;
                }
                uRef.set(user);
            }
        });

        function updateUI() {
            document.getElementById('score').innerText = Math.floor(user.sc).toLocaleString();
            document.getElementById('en-txt').innerText = Math.floor(user.en);
            document.getElementById('ref-count').innerText = user.refs || 0;
            document.getElementById('energy-fill').style.width = (user.en/user.mx*100) + "%";
            let r = "BRONZE"; if(user.sc>1000000) r="💎 DIAMOND"; else if(user.sc>100000) r="🥇 GOLD";
            document.getElementById('vip-rank').innerText = r;
        }

        document.getElementById('coin').onclick = (e) => {
            if(user.en >= user.pw) {
                user.sc += user.pw; user.en -= user.pw; updateUI(); uRef.update({sc:user.sc, en:user.en});
                const d = document.createElement('div'); d.className='tap-num'; d.innerText=`+${user.pw}`;
                d.style.left=e.pageX+'px'; d.style.top=e.pageY+'px'; document.body.appendChild(d);
                setTimeout(()=>d.remove(), 600);
            }
        };

        function daily() {
            if(Date.now()-(user.last||0)>86400000){ user.sc+=10000; user.last=Date.now(); uRef.update(user); tg.showAlert("Bonus olindi!"); }
            else tg.showAlert("Ertaga kuting!");
        }
        function boost() { if(user.sc>=5000){user.sc-=5000; user.pw++; uRef.update(user);} }
        function doTask(a) { user.sc+=a; uRef.update({sc:user.sc}); tg.showAlert("Bajarildi!"); }
        function invite() { tg.openTelegramLink(`https://t.me/share/url?url=https://t.me/SizningBot?start=ref${userId}&text=Bonus ol!`); }
        function openMod(id) { document.getElementById(id).classList.add('active'); document.getElementById('overlay').style.display='block'; }
        function closeMod() { document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active')); document.getElementById('overlay').style.display='none'; }
        setInterval(() => { if(user.en<user.mx){user.en=Math.min(user.mx, user.en+3); updateUI(); uRef.update({en:user.en});} }, 1500);
    </script>
</body>
</html>
