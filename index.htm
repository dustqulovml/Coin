            <!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>Tap Master Pro</title>
    <style>
        :root {
            --gold: linear-gradient(180deg, #ffdf00 0%, #d4af37 100%);
            --bg: #0a0a0a;
        }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden; user-select: none; touch-action: none;
        }

        .header { margin-top: 20px; text-align: center; z-index: 10; }
        
        /* Foydalanuvchi ismi dizayni */
        #user-name {
            font-size: 16px; color: #888; margin-bottom: 5px; font-weight: bold;
        }

        .league-badge {
            background: rgba(255, 255, 255, 0.1); padding: 5px 15px;
            border-radius: 20px; font-size: 12px; font-weight: 600;
            color: #f3ba2f; border: 1px solid rgba(243, 186, 47, 0.3);
        }

        #score {
            font-size: 55px; font-weight: 900; margin: 10px 0;
            background: var(--gold); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 10px rgba(212, 175, 55, 0.5));
        }

        /* Qolgan dizaynlar avvalgidek qoladi... */
        .coin-area { position: relative; margin-top: 20px; }
        #coin { width: 260px; height: 260px; cursor: pointer; transition: transform 0.05s; }
        #coin img { width: 100%; height: 100%; }
        .footer { position: fixed; bottom: 30px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; }
        .progress-container { width: 100%; height: 12px; background: #222; border-radius: 6px; overflow: hidden; }
        #progress-bar { height: 100%; width: 100%; background: var(--gold); }
        .nav-menu { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .nav-item { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 10px; text-align: center; }
        .tap-num { position: absolute; color: white; font-size: 32px; font-weight: 800; animation: floatUp 0.7s ease-out forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="header">
        <div id="user-name">Yuklanmoqda...</div>
        <div class="league-badge" id="league">BRONZE LEAGUE</div>
        <div id="score">0</div>
    </div>

    <div class="coin-area">
        <div id="coin">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968260.png" alt="coin">
        </div>
    </div>

    <div class="footer">
        <div style="display: flex; justify-content: space-between; font-size: 14px;">
            <span>⚡ Energy</span>
            <span id="energy-text">1000/1000</span>
        </div>
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div class="nav-menu">
            <div class="nav-item" onclick="upgradeTap()">
                <div>🚀</div><div style="font-size: 11px;">Multitap</div><div id="multitap-cost" style="color:#f3ba2f;">100</div>
            </div>
            <div class="nav-item" onclick="upgradeEnergy()">
                <div>🔋</div><div style="font-size: 11px;">Limit</div><div id="energy-cost" style="color:#f3ba2f;">200</div>
            </div>
            <div class="nav-item">
                <div>👥</div><div style="font-size: 11px;">Friends</div><div style="color:#f3ba2f;">Soon</div>
            </div>
        </div>
    </div>

    <script>
        // Telegramdan ma'lumot olish
        const tg = window.Telegram.WebApp;
        tg.expand(); // O'yinni to'liq ekranda ochish

        const userNameEl = document.getElementById('user-name');
        
        // Foydalanuvchi ismini o'rnatish
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userNameEl.innerText = "@" + tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name;
        } else {
            userNameEl.innerText = "Foydalanuvchi";
        }

        let data = {
            score: parseInt(localStorage.getItem('tap_score')) || 0,
            energy: parseInt(localStorage.getItem('tap_energy')) || 1000,
            maxEnergy: parseInt(localStorage.getItem('tap_max')) || 1000,
            power: parseInt(localStorage.getItem('tap_power')) || 1
        };

        function updateUI() {
            document.getElementById('score').innerText = data.score.toLocaleString();
            document.getElementById('energy-text').innerText = `${Math.floor(data.energy)}/${data.maxEnergy}`;
            document.getElementById('progress-bar').style.width = (data.energy / data.maxEnergy * 100) + "%";
            document.getElementById('multitap-cost').innerText = data.power * 200;
            document.getElementById('energy-cost').innerText = (data.maxEnergy / 100) * 150;
            
            localStorage.setItem('tap_score', data.score);
            localStorage.setItem('tap_energy', data.energy);
            localStorage.setItem('tap_max', data.maxEnergy);
            localStorage.setItem('tap_power', data.power);
        }

        const coin = document.getElementById('coin');
        coin.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for(let i=0; i < e.touches.length; i++) {
                if (data.energy >= data.power) {
                    data.score += data.power;
                    data.energy -= data.power;
                    createFloatingText(e.touches[i].clientX, e.touches[i].clientY);
                }
            }
            coin.style.transform = 'scale(0.95)';
            setTimeout(() => coin.style.transform = 'scale(1)', 50);
            updateUI();
        });

        function createFloatingText(x, y) {
            const el = document.createElement('div');
            el.className = 'tap-num';
            el.innerText = `+${data.power}`;
            el.style.left = `${x - 20}px`;
            el.style.top = `${y - 40}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 700);
        }

        function upgradeTap() {
            let cost = data.power * 200;
            if(data.score >= cost) { data.score -= cost; data.power++; updateUI(); }
        }

        function upgradeEnergy() {
            let cost = (data.maxEnergy / 100) * 150;
            if(data.score >= cost) { data.score -= cost; data.maxEnergy += 500; data.energy = data.maxEnergy; updateUI(); }
        }

        setInterval(() => {
            if(data.energy < data.maxEnergy) { data.energy = Math.min(data.maxEnergy, data.energy + 1.5); updateUI(); }
        }, 1000);

        updateUI();
    </script>
</body>
</html>
